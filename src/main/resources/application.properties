spring.application.name=backend

# --- Database (Neon PostgreSQL) ---
# These are read from environment variables set on Render.
# Locally, create a .env or export them in your shell before running.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Neon free tier pools connections aggressively and can drop idle ones;
# keep the Hikari pool small and validate connections before use.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# --- Server ---
# Render provides the PORT env var; default to 8080 for local runs.
server.port=${PORT:8080}

# --- CORS ---
# Comma-separated list of allowed frontend origins (Cloudflare Pages URL + localhost).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
